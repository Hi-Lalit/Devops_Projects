<VirtualHost *:8070>
    ServerAdmin webmaster@Bharatyatra.com
    DocumentRoot /var/www/Bharatyatra
    ServerName Bharatyatra.com
    ServerAlias www.BharatYatra.com

    <Directory /var/www/Bharatyatra>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    ErrorDocument 404 /error_404.html

    ErrorLog ${APACHE_LOG_DIR}/Bharatyatra_error.log
    CustomLog ${APACHE_LOG_DIR}/Bharatyatra_access.log combined
</VirtualHost>

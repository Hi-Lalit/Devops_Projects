<VirtualHost *:80>
    ServerAdmin webmaster@uit.edu
    DocumentRoot /var/www/uit
    ServerName uit.edu
    ServerAlias www.uit.edu

    <Directory /var/www/uit>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    ErrorDocument 404 /error_404.html

    ErrorLog ${APACHE_LOG_DIR}/uit_error.log
    CustomLog ${APACHE_LOG_DIR}/uit_access.log combined
</VirtualHost>
